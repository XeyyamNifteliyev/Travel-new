name: Visa Data Scraper

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      batch:
        description: 'Batch number (1-5, or 0 for all)'
        required: false
        default: '0'

jobs:
  scrape-batch-1:
    runs-on: ubuntu-latest
    steps:
      - name: Scrape Batch 1 (countries 1-25)
        run: |
          curl -X POST \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.SITE_URL }}/api/visa/scraper?batch=1"

  scrape-batch-2:
    runs-on: ubuntu-latest
    steps:
      - name: Scrape Batch 2 (countries 26-50)
        run: |
          curl -X POST \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.SITE_URL }}/api/visa/scraper?batch=2"

  scrape-batch-3:
    runs-on: ubuntu-latest
    steps:
      - name: Scrape Batch 3 (countries 51-75)
        run: |
          curl -X POST \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.SITE_URL }}/api/visa/scraper?batch=3"

  scrape-batch-4:
    runs-on: ubuntu-latest
    steps:
      - name: Scrape Batch 4 (countries 76-100)
        run: |
          curl -X POST \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.SITE_URL }}/api/visa/scraper?batch=4"

  scrape-batch-5:
    runs-on: ubuntu-latest
    steps:
      - name: Scrape Batch 5 (countries 101+)
        run: |
          curl -X POST \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.SITE_URL }}/api/visa/scraper?batch=5"
